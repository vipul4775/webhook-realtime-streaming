server.port=8080
spring.application.name=webhook-realtime-demo

# Jackson configuration for proper timestamp serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Webhook Security Configuration
# IMPORTANT: In production, use environment variable or secure vault
webhook.secret=${WEBHOOK_SECRET:my-super-secret-key-change-in-production}
